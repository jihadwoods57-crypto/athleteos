:root{
  --bg:#070B14; --bg-grad-top:#0A1120; --surface-1:#0E1421; --surface-2:#131C2D; --surface-3:#1A2436;
  --hairline:rgba(148,176,224,0.10); --hairline-soft:rgba(148,176,224,0.055);
  --text:#EEF3FB; --text-2:#9AA9C2; --text-3:#64748B;
  --blue:#3B82F6; --blue-bright:#60A5FA; --blue-deep:#2563EB; --blue-surface:rgba(59,130,246,0.14); --blue-border:rgba(59,130,246,0.34);
  --green:#34D399; --green-bright:#4ADE80; --green-surface:rgba(52,211,153,0.13); --green-border:rgba(52,211,153,0.30);
  --amber:#F5A524; --amber-bright:#FBBF24; --amber-border:rgba(245,165,36,0.32);
  --purple:#A855F7; --purple-bright:#C084FC; --purple-surface:rgba(168,85,247,0.13); --purple-border:rgba(168,85,247,0.34);
  --red:#F65757; --red-surface:rgba(246,87,87,0.13);
  --font:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  --r-card:22px; --r-tile:15px; --r-pill:999px; --r-btn:17px;
  --pad-screen:20px;
  --sh-card:0 1px 0 rgba(255,255,255,0.02) inset,0 8px 24px rgba(0,0,0,0.36);
  --sh-purple:0 12px 34px rgba(168,85,247,0.34);
  --ease-out:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
.stage{min-height:100vh;background:radial-gradient(1200px 600px at 50% -8%,#0d1830 0%,transparent 60%),#05070d;color:var(--text);font-family:var(--font);font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;gap:20px;padding:34px 16px 60px}

/* prototype control */
.proto-ctrl{display:flex;flex-direction:column;align-items:center;gap:10px;max-width:402px;width:100%}
.proto-ctrl .lede{font-size:12.5px;font-weight:700;color:var(--text-3);letter-spacing:0.01em;text-align:center}
.seg2{display:flex;gap:6px;background:var(--surface-1);border:1px solid var(--hairline);padding:5px;border-radius:var(--r-pill)}
.seg2 button{appearance:none;border:none;background:transparent;color:var(--text-2);font-family:var(--font);font-weight:700;font-size:12.5px;letter-spacing:0.01em;padding:9px 15px;border-radius:var(--r-pill);cursor:pointer;transition:all .2s var(--ease-out)}
.seg2 button.on{background:linear-gradient(150deg,var(--purple-bright),#7e22ce);color:#fff;box-shadow:0 6px 18px rgba(168,85,247,0.30)}
.seg2 button:focus-visible{outline:2px solid var(--purple-bright);outline-offset:2px}

/* device */
.device{width:402px;max-width:100%;height:872px;border-radius:56px;padding:12px;background:linear-gradient(160deg,#20293b,#0a0f1a 60%);box-shadow:0 0 0 2px rgba(255,255,255,0.04),0 40px 90px rgba(0,0,0,0.7),0 8px 30px rgba(0,0,0,0.5);position:relative;flex:none}
.screen{position:relative;width:100%;height:100%;border-radius:45px;overflow:hidden;background:linear-gradient(180deg,var(--bg-grad-top) 0%,var(--bg) 34%,var(--bg) 100%);display:flex;flex-direction:column}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:116px;height:33px;background:#000;border-radius:var(--r-pill);z-index:60}
.statusbar{height:52px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 30px;font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.01em}
.statusbar .sb-right{display:flex;align-items:center;gap:7px}
.viewport{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:4px var(--pad-screen) 40px;scroll-behavior:smooth}
.viewport::-webkit-scrollbar{display:none}
.view{animation:viewIn .34s var(--ease-out)}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* back head */
.back-head{display:flex;align-items:center;gap:14px;padding:6px 0 16px}
.back-head .bk{width:40px;height:40px;border-radius:var(--r-pill);background:var(--surface-1);border:1px solid var(--hairline);display:grid;place-items:center;color:var(--text);cursor:pointer}
.back-head .bk:focus-visible{outline:2px solid var(--purple-bright);outline-offset:2px}
.back-head .ht{font-size:20px;font-weight:800;letter-spacing:-0.02em}
.back-head .hs{font-size:12px;font-weight:600;color:var(--text-2);margin-top:1px}

.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin:26px 2px 12px;display:flex;align-items:center;justify-content:space-between}
.card{background:var(--surface-1);border:1px solid var(--hairline);border-radius:var(--r-card);box-shadow:var(--sh-card)}

/* business identity header */
.biz{display:flex;align-items:center;gap:15px;padding:18px}
.biz .logo{width:60px;height:60px;border-radius:18px;background:linear-gradient(150deg,var(--purple-bright),#7e22ce);display:grid;place-items:center;font-size:23px;font-weight:800;color:#fff;box-shadow:var(--sh-purple);flex:none;letter-spacing:-0.02em}
.biz .nm{font-size:20px;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
.biz .who{font-size:13px;font-weight:600;color:var(--text-2);margin-top:3px}
.biz .facts{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.chip-fact{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;letter-spacing:0.01em;padding:5px 11px;border-radius:var(--r-pill);border:1.5px solid var(--purple-border);color:var(--purple-bright);background:var(--purple-surface);white-space:nowrap}
.chip-fact.muted{border-color:var(--hairline);color:var(--text-2);background:transparent}
.chip-fact .dot{width:6px;height:6px;border-radius:50%;background:var(--green-bright);box-shadow:0 0 8px rgba(74,222,128,0.7)}

/* invitation hero */
.invite{padding:18px 18px 16px;position:relative;overflow:hidden}
.invite::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 100% 0%,rgba(168,85,247,0.14),transparent 55%);pointer-events:none}
.invite .top{display:flex;gap:16px;align-items:center;position:relative}
.qr-tile{width:132px;height:132px;flex:none;background:#fff;border-radius:16px;padding:11px;box-shadow:0 8px 22px rgba(0,0,0,0.4);display:grid;place-items:center}
.qr-tile svg{width:100%;height:100%;display:block;shape-rendering:crispEdges}
.invite .rt{flex:1;min-width:0}
.invite .kicker{font-size:11px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--purple-bright)}
.invite .code{display:flex;gap:6px;margin:10px 0 6px;flex-wrap:wrap}
.invite .cb{width:34px;height:44px;border-radius:10px;background:rgba(168,85,247,0.08);border:1.5px solid var(--purple-border);display:grid;place-items:center;font-size:19px;font-weight:800;color:var(--text);letter-spacing:0}
.invite .hint{font-size:12px;font-weight:600;color:var(--text-2);line-height:1.45}
.linkchip{display:flex;align-items:center;gap:10px;margin-top:14px;padding:11px 13px;border-radius:12px;background:var(--surface-2);border:1px solid var(--hairline-soft);position:relative}
.linkchip .url{flex:1;min-width:0;font-size:12.5px;font-weight:700;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:normal}
.linkchip .cpy{flex:none;color:var(--text-3);cursor:pointer;display:grid;place-items:center;width:30px;height:30px;border-radius:9px}
.linkchip .cpy:hover{color:var(--text);background:var(--surface-3)}
.linkchip .cpy:focus-visible{outline:2px solid var(--purple-bright);outline-offset:1px}
.invite-actions{display:flex;gap:10px;margin-top:14px;position:relative}
.btn{appearance:none;border:none;font-family:var(--font);font-weight:800;font-size:15px;letter-spacing:-0.01em;border-radius:var(--r-btn);height:52px;display:inline-flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;transition:transform .16s var(--ease-out)}
.btn:active{transform:scale(0.98)}
.btn:focus-visible{outline:2px solid var(--purple-bright);outline-offset:2px}
.btn.share{flex:1;background:linear-gradient(150deg,var(--purple-bright),#7e22ce);color:#fff;box-shadow:var(--sh-purple)}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--hairline);padding:0 18px}
.share-note{font-size:12.5px;font-weight:700;color:var(--text-2);margin-top:10px;min-height:16px;text-align:center;position:relative}
.share-note.err{color:var(--amber-bright)}

/* generic rows */
.lrow{display:flex;align-items:center;gap:13px;padding:15px 2px;border-bottom:1px solid var(--hairline-soft);cursor:pointer}
.lrow:last-child{border-bottom:none}
.lrow .lic{width:38px;height:38px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;color:var(--text-2);flex:none}
.lrow .lm{flex:1;min-width:0}.lrow .lt{font-size:15px;font-weight:700}.lrow .ls{font-size:12px;font-weight:600;color:var(--text-3);margin-top:1px}
.lrow:focus-visible{outline:2px solid var(--purple-bright);outline-offset:2px;border-radius:8px}
.pad16{padding:6px 16px}
.tag{font-size:10.5px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;padding:4px 9px;border-radius:var(--r-pill);border:1.5px solid var(--hairline);color:var(--text-3)}
.tag.soon{color:var(--purple-bright);border-color:var(--purple-border);background:var(--purple-surface)}

/* sidebox (pending / info) */
.sidebox{padding:14px 16px;border-radius:var(--r-tile);background:var(--surface-2);border:1px solid var(--hairline-soft);display:flex;gap:12px;align-items:flex-start}
.sidebox .ic{width:38px;height:38px;border-radius:11px;flex:none;display:grid;place-items:center;background:var(--purple-surface);color:var(--purple-bright)}
.sidebox .tt{font-size:13.5px;font-weight:800}
.sidebox .ts{font-size:12.5px;font-weight:600;color:var(--text-2);margin-top:3px;line-height:1.45}

/* roadmap */
.rm-row{display:flex;align-items:center;gap:13px;padding:13px 2px;border-bottom:1px solid var(--hairline-soft)}
.rm-row:last-child{border-bottom:none}
.rm-row .ic{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;background:var(--surface-2);color:var(--text-2)}
.rm-row .lt{font-size:14.5px;font-weight:700}.rm-row .ls{font-size:11.5px;font-weight:600;color:var(--text-3);margin-top:1px}

/* skeleton */
.sk{background:linear-gradient(100deg,var(--surface-2) 30%,var(--surface-3) 50%,var(--surface-2) 70%);background-size:200% 100%;animation:sh 1.3s linear infinite;border-radius:8px}
@keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}
.foot-note{font-size:11.5px;font-weight:600;color:var(--text-3);padding:0 2px;line-height:1.5;margin-top:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

    chart:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V4M4 20h16"/><rect x="7.5" y="12" width="3" height="5" rx="1"/><rect x="13" y="8" width="3" height="9" rx="1"/><rect x="18" y="5" width="3" height="12" rx="1" opacity="0.5"/></svg>',
    plug:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v5M15 3v5"/><path d="M6 8h12v3a6 6 0 0 1-12 0z"/><path d="M12 17v4"/></svg>',
    grid:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.6"/><rect x="13" y="4" width="7" height="7" rx="1.6"/><rect x="4" y="13" width="7" height="7" rx="1.6"/><rect x="13" y="13" width="7" height="7" rx="1.6"/></svg>',
    users:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.6M17.5 20a5.5 5.5 0 0 0-3-4.9"/></svg>',
    x:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>'
  };

  function qrSvg(text){
    var q=window.OSQR.encode(text);var n=q.size,m=q.modules;
    var cells='';
    for(var y=0;y<n;y++)for(var x=0;x<n;x++){if(m[y][x])cells+='<rect x="'+x+'" y="'+y+'" width="1" height="1"/>';}
    return '<svg viewBox="-1 -1 '+(n+2)+' '+(n+2)+'" xmlns="http://www.w3.org/2000/svg"><rect x="-1" y="-1" width="'+(n+2)+'" height="'+(n+2)+'" fill="#fff"/><g fill="#070B14">'+cells+'</g></svg>';
  }

  function inviteBlock(){
    if(state==='pending'){
      return '<div class="eyebrow">Invite a client</div>'+
      '<div class="sidebox"><div class="ic">'+I.clip+'</div><div><div class="tt">Your code mints on next sign-in</div>'+
      '<div class="ts">The client code and QR appear here the moment your practice finishes setting up. Nothing is shown until it is real.</div></div></div>';
    }
    if(state==='loading'){
      return '<div class="eyebrow">Invite a client</div>'+
      '<section class="card invite"><div class="top">'+
      '<div class="sk" style="width:132px;height:132px;border-radius:16px"></div>'+
      '<div class="rt" style="flex:1">'+
        '<div class="sk" style="width:60%;height:12px"></div>'+
        '<div class="sk" style="width:80%;height:44px;margin-top:12px;border-radius:10px"></div>'+
        '<div class="sk" style="width:90%;height:12px;margin-top:12px"></div>'+
      '</div></div><div class="sk" style="height:44px;border-radius:12px;margin-top:14px"></div>'+
      '<div class="invite-actions"><div class="sk" style="flex:1;height:52px;border-radius:var(--r-btn)"></div><div class="sk" style="width:120px;height:52px;border-radius:var(--r-btn)"></div></div></section>';
    }
    var boxes=INVITE_CODE.split('').map(function(c){return '<div class="cb">'+c+'</div>';}).join('');
    return '<div class="eyebrow">Invite a client</div>'+
    '<section class="card invite">'+
      '<div class="top">'+
        '<div class="qr-tile" aria-label="QR code to join Boone Performance">'+qrSvg(INVITE_URL)+'</div>'+
        '<div class="rt">'+
          '<div class="kicker">Client code</div>'+
          '<div class="code">'+boxes+'</div>'+
          '<div class="hint">Scan the code, or enter it in the app. One handshake, no forms.</div>'+
        '</div>'+
      '</div>'+
      '<div class="linkchip"><span class="url">onstandard.app/j/'+INVITE_CODE+'</span>'+
        '<span class="cpy" id="copy-link" role="button" tabindex="0" aria-label="Copy invite link">'+I.copy+'</span></div>'+
      '<div class="invite-actions">'+
        '<button class="btn share" id="share-btn">'+I.share+' Share invite</button>'+
        '<button class="btn ghost" id="copy-code">'+I.copy+' Copy code</button>'+
      '</div>'+
      '<div class="share-note" id="share-note"></div>'+
    '</section>';
  }

  function header(){
    if(state==='loading'){
      return '<section class="card biz">'+
        '<div class="sk" style="width:60px;height:60px;border-radius:18px"></div>'+
        '<div style="flex:1"><div class="sk" style="width:65%;height:18px"></div>'+
        '<div class="sk" style="width:45%;height:12px;margin-top:9px"></div>'+
        '<div class="sk" style="width:38%;height:20px;margin-top:12px;border-radius:999px"></div></div></section>';
    }
    return '<section class="card biz">'+
      '<div class="logo">'+PRACTICE[0]+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div class="nm">'+PRACTICE+'</div>'+
        '<div class="who">'+TRAINER+' &middot; Head Trainer</div>'+
        '<div class="facts">'+
          '<span class="chip-fact">'+CLIENTS+' clients</span>'+
          (state==='pending'?'<span class="chip-fact muted">Setup pending</span>':'<span class="chip-fact muted"><span class="dot"></span>Code active</span>')+
        '</div>'+
      '</div></section>';
  }

  function manageRow(icon,color,t,s,right){
    return '<div class="lrow" tabindex="0" role="button">'+
      '<div class="lic"'+(color?' style="color:'+color+'"':'')+'>'+icon+'</div>'+
      '<div class="lm"><div class="lt">'+t+'</div><div class="ls">'+s+'</div></div>'+right+'</div>';
  }
  function rmRow(icon,t,s){
    return '<div class="rm-row"><div class="ic">'+icon+'</div>'+
      '<div class="lm" style="flex:1"><div class="lt">'+t+'</div><div class="ls">'+s+'</div></div>'+
      '<span class="tag soon">Soon</span></div>';
  }

  function render(){
    var chev='<span style="color:var(--text-3)">'+I.chev+'</span>';
    var html=''+
    '<div class="back-head"><div class="bk" tabindex="0" role="button" aria-label="Back to your clients">'+I.back+'</div>'+
      '<div><div class="ht">Practice HQ</div><div class="hs">'+(state==='loading'?'Loading your practice':PRACTICE)+'</div></div></div>'+
    header()+
    inviteBlock()+
    '<div class="eyebrow">Manage</div>'+
    '<section class="card pad16">'+
      manageRow(I.clip,null,'Default client standard','Three meals, recovery, weekly weight',chev)+
      manageRow(I.lock,null,'Your visibility scope','Recovery, readiness, consistency only',chev)+
      manageRow(I.tag,'var(--purple-bright)','Branding','Logo and practice colors on client screens','<span class="tag soon">Soon</span>')+
    '</section>'+
    '<div class="eyebrow">Coming to Practice HQ</div>'+
    '<section class="card pad16">'+
      rmRow(I.pulse,'Business health','Revenue, retention, and churn at a glance')+
      rmRow(I.heart,'Client health signals','Who is slipping before they cancel')+
      rmRow(I.spark,'AI assistant','Drafts check-ins and flags clients in your voice')+
      rmRow(I.chart,'Analytics','Adherence and outcome trends across your book')+
      rmRow(I.plug,'Integrations','Calendar, payments, and your existing stack')+
      rmRow(I.grid,'Business tools','Packages, invoicing, and program templates')+
    '</section>'+
    '<div class="foot-note">In development means we are building it, not faking it. These sections stay dark until the real data and controls are wired.</div>'+
    '<div class="eyebrow">Account</div>'+
    '<section class="card pad16">'+
      manageRow(I.bolt,null,'Trainer plan &amp; billing','Priced per active client',chev)+
      '<div class="lrow" tabindex="0" role="button"><div class="lic" style="color:var(--red)">'+I.x+'</div>'+
        '<div class="lm"><div class="lt" style="color:var(--red)">Sign out</div></div></div>'+
    '</section>'+
    '<div style="height:20px"></div>';
    var v=document.getElementById('view');
    v.innerHTML=html;
    v.style.animation='none';v.offsetHeight;v.style.animation='';
    wire();
  }

  function flash(el,label){var o=el.innerHTML;el.innerHTML=label;setTimeout(function(){el.innerHTML=o;},1600);}
  function copy(text){
    try{return navigator.clipboard.writeText(text);}catch(e){}
    try{var t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();}catch(e){}
    return Promise.resolve();
  }

  function wire(){
    if(state!=='ready')return;
    var note=document.getElementById('share-note');
    var cc=document.getElementById('copy-code');
    cc&&cc.addEventListener('click',function(){copy(INVITE_CODE);flash(cc,I.check+' Copied');});
    var cl=document.getElementById('copy-link');
    function doLink(){copy(INVITE_URL);flash(cl,I.check);}
    cl&&cl.addEventListener('click',doLink);
    cl&&cl.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();doLink();}});
    var sb=document.getElementById('share-btn');
    sb&&sb.addEventListener('click',function(){
      note.className='share-note';note.textContent='';
      var payload={title:PRACTICE,text:'Join '+PRACTICE+' on OnStandard. Code '+INVITE_CODE+'.',url:INVITE_URL};
      if(navigator.share){
        navigator.share(payload).then(function(){note.textContent='Shared.';})
        .catch(function(){note.textContent='Share dismissed.';});
      }else{
        // native share bridge path (SHARE) exists in-app; on this preview we fall back to copy
        copy(INVITE_URL);
        note.className='share-note err';
        note.textContent='Native share opens in the app. Link copied here instead.';
      }
    });
  }

  document.querySelectorAll('.seg2 button').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.seg2 button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');state=b.getAttribute('data-state');render();
    });
  });
  render();
})();
</script>
