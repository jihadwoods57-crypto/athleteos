<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Your phone number was changed</title></head>
<body style="margin:0;padding:0;background:#F8FAFC;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F8FAFC;padding:36px 16px">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(16,24,40,.08)">
        <tr><td style="height:4px;background:#2563EB;background:linear-gradient(120deg,#34D399,#22D3EE,#3B82F6);line-height:0;font-size:0">&nbsp;</td></tr>
        <tr><td style="padding:30px 34px 0">
          <table role="presentation" cellpadding="0" cellspacing="0"><tr>
            <td style="width:30px;height:30px;border-radius:9px;background:#2563EB;background:linear-gradient(120deg,#34D399,#22D3EE,#3B82F6)">
              <table role="presentation" width="30" height="30" cellpadding="0" cellspacing="0"><tr><td align="center" valign="middle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </td></tr></table>
            </td>
            <td style="padding-left:10px;font-size:17px;font-weight:800;letter-spacing:-.3px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
              <span style="color:#0F172A">On</span><span style="color:#2563EB">Standard</span>
            </td>
          </tr></table>
        </td></tr>
        <tr><td style="padding:22px 34px 0">
          <span style="display:inline-block;padding:3px 10px;border-radius:999px;background:#FDF3E0;color:#92400E;font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">Security</span>
        </td></tr>
        <tr><td style="padding:12px 34px 0">
          <h1 style="margin:0;font-size:21px;line-height:1.3;color:#0F172A;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">Your phone number was changed</h1>
        </td></tr>
        <tr><td style="padding:10px 34px 0">
          <div style="font-size:14.5px;line-height:1.65;color:#475569;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">The phone number for your OnStandard account was changed from <strong style="color:#0F172A">{{ .OldPhone }}</strong> to <strong style="color:#0F172A">{{ .Phone }}</strong>.</div>
        </td></tr>
        <tr><td style="padding:0 34px"></td></tr>
        <tr><td style="padding:28px 34px 0"><div style="height:1px;background:#E2E8F0"></div></td></tr>
        <tr><td style="padding:16px 34px 30px">

          <p style="margin:0;font-size:12px;line-height:1.6;color:#6B7280;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">OnStandard &middot; onstandard.app</p>
        </td></tr>
      </table>
    </td></tr>
