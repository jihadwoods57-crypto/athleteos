<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Your verification code</title></head>
<body style="margin:0;padding:0;background:#F6F4EE;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F6F4EE;padding:36px 16px">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(16,24,40,.08)">
        <tr><td style="height:4px;background:linear-gradient(150deg,#37D586,#16A34A);line-height:0;font-size:0">&nbsp;</td></tr>
        <tr><td style="padding:30px 34px 0">
          <table role="presentation" cellpadding="0" cellspacing="0"><tr>
            <td style="width:30px;height:30px;border-radius:9px;background:linear-gradient(150deg,#37D586,#16A34A)">
              <table role="presentation" width="30" height="30" cellpadding="0" cellspacing="0"><tr><td align="center" valign="middle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#05130B" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
              </td></tr></table>
            </td>
            <td style="padding-left:10px;font-size:17px;font-weight:800;letter-spacing:-.3px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
              <span style="color:#16A34A">On</span><span style="color:#161B22">Standard</span>
            </td>
          </tr></table>
        </td></tr>
        <tr><td style="padding:22px 34px 0">
          <span style="display:inline-block;padding:3px 10px;border-radius:999px;background:#FDF3E0;color:#92400E;font-size:11.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">Verify it's you</span>
        </td></tr>
        <tr><td style="padding:12px 34px 0">
          <h1 style="margin:0;font-size:21px;line-height:1.3;color:#161B22;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">Your verification code</h1>
        </td></tr>
        <tr><td style="padding:10px 34px 0">
          <div style="font-size:14.5px;line-height:1.65;color:#5B6470;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">Enter this code in OnStandard to verify your identity. It expires shortly.</div>
        </td></tr>
        <tr><td style="padding:0 34px">
    <table role="presentation" cellpadding="0" cellspacing="0" style="margin:22px 0 6px">
      <tr><td style="background:#F6F4EE;border:1px solid #EDEBE3;border-radius:10px;padding:16px 22px">
        <div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px;font-weight:700;letter-spacing:.12em;color:#161B22">{{ .Token }}</div>
      </td></tr>
    </table></td></tr>
        <tr><td style="padding:28px 34px 0"><div style="height:1px;background:#EDEBE3"></div></td></tr>
        <tr><td style="padding:16px 34px 30px">
          <p style="margin:0 0 4px;font-size:12px;line-height:1.6;color:#6B7280;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">If you didn't request this code, you can safely ignore this email.</p>
          <p style="margin:0;font-size:12px;line-height:1.6;color:#6B7280;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">OnStandard &middot; onstandard.app</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body></html>
