<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://esm.sh; style-src 'unsafe-inline'; connect-src https://ftwrvylzoyznhbzhgism.supabase.co https://esm.sh; img-src 'self' data:; frame-ancestors 'none'; base-uri 'none'; form-action 'none'">
<meta name="robots" content="noindex, nofollow">
<title>OnStandard — Reset password</title>
<style>
  :root { --bg:#0a0d12; --surface:#141a22; --line2:#2f3a48; --ink:#eef2f7; --ink2:#aeb9c7; --mut:#7c8798;
    --teal:#33c6d6; --warn:#f0616d; --ok:#3ecf8e; --sig:linear-gradient(120deg,#3b82f6 0%,#33c6d6 100%);
    --r:14px; --r-sm:10px; --sans:system-ui,-apple-system,Segoe UI,sans-serif; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.55 var(--sans); }
  .login { max-width:380px; margin:12vh auto; padding:0 16px; }
  .card { background:var(--surface); border:1px solid #232c38; border-radius:var(--r); padding:26px; }
  .mark { width:26px; height:26px; border-radius:8px; background:var(--sig); display:inline-block; vertical-align:middle; }
  h1 { font-size:19px; margin:14px 0 4px; }
  p { color:var(--ink2); font-size:13.5px; margin:0 0 6px; }
  label { display:block; font-size:12px; color:var(--ink2); margin:12px 0 5px; font-weight:500; }
  input { font:inherit; background:#0d1118; border:1px solid var(--line2); color:var(--ink); border-radius:var(--r-sm); padding:11px 13px; width:100%; }
  button { font:inherit; cursor:pointer; border:0; border-radius:var(--r-sm); width:100%; justify-content:center;
    background:var(--sig); color:#04222b; font-weight:700; padding:11px 14px; margin-top:16px; }
  button[disabled] { opacity:.5; pointer-events:none; }
  .err { color:var(--warn); font-size:13.5px; margin:8px 0 0; min-height:18px; }
  .ok { color:var(--ok); }
  a { color:var(--teal); text-decoration:none; }
</style></head>
<body>
  <div class="login"><div class="card">
    <div><span class="mark"></span></div>
    <h1>Set a new password</h1>
    <p id="lead">Verifying your reset link…</p>
    <div id="form" style="display:none">
      <label for="pw">New password</label>
      <input id="pw" type="password" autocomplete="new-password" placeholder="At least 8 chars, letters + numbers">
      <button id="save" disabled>Update password</button>
    </div>
    <p id="msg" class="err"></p>
    <p style="margin-top:12px"><a href="./">← Back to sign in</a></p>
  </div></div>
  <script type="module">
    import { sb } from './api.js';
    import { validateNewPassword } from './authflow.mjs';
    const $ = (id) => document.getElementById(id);
    function enable() { $('lead').textContent = 'Choose a new password for your admin account.'; $('form').style.display = 'block'; $('save').disabled = false; }
    // supabase-js processes the recovery link on load; a recovery session then exists.
    sb.auth.onAuthStateChange((event) => { if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') enable(); });
    (async () => {
      await new Promise((r) => setTimeout(r, 400));
      const { data } = await sb.auth.getSession();
      if (data.session) enable();
      else $('msg').textContent = 'This reset link is invalid or has expired. Request a new one from the sign-in page.';
    })();
    $('save').onclick = async () => {
      $('msg').className = 'err'; $('msg').textContent = '';
      const v = validateNewPassword($('pw').value);
      if (!v.ok) { $('msg').textContent = v.error; return; }
      const { error } = await sb.auth.updateUser({ password: $('pw').value });
      if (error) { $('msg').textContent = error.message; return; }
      $('msg').className = 'ok'; $('msg').textContent = 'Password updated. Redirecting to sign in…';
      setTimeout(() => { location.href = './'; }, 1400);
    };
  </script>
</body></html>
