<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: 'Archivo'; font-weight: 100 900; font-stretch: 62% 125%; src: url('../../landing/fonts/archivo-var.woff2') format('woff2'); }
  @font-face { font-family: 'Plus Jakarta Sans'; font-weight: 200 800; src: url('../../landing/fonts/pjs.woff2') format('woff2'); }
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }
  .card {
    width: 1200px; height: 630px; position: relative;
    background:
      radial-gradient(760px 520px at 84% 30%, rgba(232,180,74,0.16), transparent 62%),
      radial-gradient(500px 380px at 8% 95%, rgba(232,180,74,0.07), transparent 60%),
      linear-gradient(180deg, #100E0A 0%, #0B0A08 62%);
    display: flex; align-items: center; padding: 0 0 0 78px; color: #F5F1E8;
  }
  .copy { flex: 1; position: relative; z-index: 2; }
  .brand { display: flex; align-items: center; gap: 13px; margin-bottom: 44px; }
  .brand span { font-family: 'Archivo'; font-stretch: 116%; font-weight: 900; font-size: 25px; letter-spacing: 0.02em; }
  .kick { color: #E8B44A; font-weight: 800; font-size: 17px; letter-spacing: 0.16em; margin-bottom: 18px; }
  h1 { font-family: 'Archivo'; font-stretch: 118%; font-weight: 900; font-size: 92px; line-height: 0.98; letter-spacing: -0.005em; }
  h1 .dot { color: #E8B44A; }
  p.sub { margin-top: 26px; font-size: 23px; font-weight: 600; color: #B5AC9B; max-width: 24ch; line-height: 1.5; }
  .phone {
    position: absolute; right: 64px; top: 60px;
    width: 300px; height: 610px; border-radius: 44px;
    background: linear-gradient(160deg, #201c15, #0e0c09);
    border: 1px solid rgba(216,190,140,0.28);
    padding: 9px;
    box-shadow: 0 50px 110px rgba(0,0,0,0.7);
    transform: rotate(4deg);
  }
  .phone .scr { width: 100%; height: 100%; border-radius: 35px; overflow: hidden; background: #070B14; }
  .phone img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
</style>
</head>
<body>
<div class="card">
  <div class="copy">
    <div class="brand">
      <svg viewBox="0 0 100 100" width="42" height="42" fill="none">
        <defs><linearGradient id="g" x1="26" y1="82" x2="58" y2="18" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#34D399"/><stop offset=".5" stop-color="#22D3EE"/><stop offset="1" stop-color="#60A5FA"/>
        </linearGradient></defs>
        <path d="M33 81.4 A34 34 0 1 1 67 81.4" stroke="rgba(216,190,140,.25)" stroke-width="12" stroke-linecap="round"/>
        <path d="M33 81.4 A34 34 0 0 1 50 18" stroke="url(#g)" stroke-width="12" stroke-linecap="round"/>
        <circle cx="50" cy="18" r="10.5" fill="#0B0A08"/><circle cx="50" cy="18" r="6" fill="#F5F1E8"/>
      </svg>
      <span>ONSTANDARD</span>
    </div>
    <div class="kick">THE STANDARD HAS CHANGED.</div>
    <h1>PROVE<br>THE WORK<span class="dot">.</span></h1>
    <p class="sub">Daily execution, turned into credible proof.</p>
  </div>
  <div class="phone"><div class="scr"><img src="../../landing/assets/product/v3-home.webp"></div></div>
</div>
</body>
</html>
