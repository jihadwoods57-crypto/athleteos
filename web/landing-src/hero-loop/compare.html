<title>Hero loop — model shootout</title>
<style>
  body { margin: 0; background: #0B0A08; color: #F5F1E8; font: 15px/1.5 system-ui, sans-serif; padding: 28px; }
  h1 { font-size: 20px; letter-spacing: .02em; }
  h1 span { color: #E8B44A; }
  p.note { color: #B5AC9B; max-width: 720px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; margin-top: 18px; }

<h1>Hero cinemagraph — <span>pick your take</span></h1>
<p class="note">All four loop automatically and are muted, exactly as they'd behave on the site. Watch the face — the test is whether he still looks like the same person at the end of the loop, and whether the room stays pitch black.</p>
<div class="grid">
  <figure class="reco">
    <video src="hero-kling-master.mp4" autoplay muted loop playsinline></video>
    <figcaption>Kling v2.1 Master<span class="tag">my pick</span><small>Face rock-solid, subtle breath, light flicker restrained, blacks stay black.</small></figcaption>
  </figure>
  <figure>
    <video src="hero-kling-25turbo.mp4" autoplay muted loop playsinline></video>
    <figcaption>Kling v2.5-turbo Pro<small>Also strong — adds visible drifting dust and phone-glow pulse; slightly livelier, slightly less subtle.</small></figcaption>
  </figure>
  <figure>
    <video src="hero-hailuo02-pro.mp4" autoplay muted loop playsinline></video>
    <figcaption>Hailuo-02 Pro<small>Face holds, but the lamp blooms and floods the room yellow — loses the pitch-black brand look.</small></figcaption>
  </figure>
  <figure>
    <video src="hero-loop.mp4" autoplay muted loop playsinline></video>
    <figcaption>DoP standard (baseline)<small>Right motion idea, but his face subtly morphs by mid-clip.</small></figcaption>
  </figure>
</div>
